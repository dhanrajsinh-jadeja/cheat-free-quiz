version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: quiz-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: quiz-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/quiz-app
      - NODE_ENV=production
      # When deployed, FRONTEND_URL should match your live domain or external IP
      - FRONTEND_URL=http://localhost
      
      # Uncomment and configure these for production features
      # - JWT_SECRET=your_production_secret
      # - GOOGLE_CLIENT_ID=your_google_id
      # - EMAIL_USER=your_email
      # - EMAIL_PASS=your_email_app_password
    depends_on:
      - mongodb

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: quiz-frontend
    restart: unless-stopped
    ports:
      # Expose Nginx on port 80
      - "80:80"
    depends_on:
      - backend

volumes:
  mongodb_data:
